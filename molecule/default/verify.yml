---
# ── Controller verification ────────────────────────────────────────────────────
- name: Verify slurm-master (controller-01)
  hosts: slurm_master
  become: true
  tasks:
      - name: Check slurm.conf exists
        stat:
            path: /etc/slurm/slurm.conf
        register: slurm_conf
      - name: Assert slurm.conf is present
        assert:
            that: slurm_conf.stat.exists
            fail_msg: "/etc/slurm/slurm.conf not found"

      - name: Check slurmdbd.conf exists
        stat:
            path: /etc/slurm/slurmdbd.conf
        register: slurmdbd_conf
      - name: Assert slurmdbd.conf is present
        assert:
            that: slurmdbd_conf.stat.exists
            fail_msg: "/etc/slurm/slurmdbd.conf not found"

      - name: Check ClusterName in slurm.conf
        command: grep -q "^ClusterName=river$" /etc/slurm/slurm.conf
        changed_when: false

      - name: Check slurmctld binary exists
        stat:
            path: /usr/local/sbin/slurmctld
        register: slurmctld_bin
      - name: Assert slurmctld binary is installed
        assert:
            that: slurmctld_bin.stat.exists
            fail_msg: "slurmctld binary not found at /usr/local/sbin/slurmctld"

      - name: Check slurmdbd binary exists
        stat:
            path: /usr/local/sbin/slurmdbd
        register: slurmdbd_bin
      - name: Assert slurmdbd binary is installed
        assert:
            that: slurmdbd_bin.stat.exists
            fail_msg: "slurmdbd binary not found at /usr/local/sbin/slurmdbd"

      - name: Check munge key is deployed
        stat:
            path: /etc/munge/munge.key
        register: munge_key
      - name: Assert munge key exists and has correct permissions
        assert:
            that:
                - munge_key.stat.exists
                - munge_key.stat.mode == "0400"
            fail_msg: "munge.key missing or wrong permissions"

      - name: Check slurm log directory is owned by slurm
        stat:
            path: /var/log/slurm
        register: slurm_log_dir
      - name: Assert log dir is owned by slurm
        assert:
            that: slurm_log_dir.stat.pw_name == "slurm"
            fail_msg: "/var/log/slurm not owned by slurm user"

      - name: Check StateSaveLocation exists and is owned by slurm
        stat:
            path: /var/lib/slurm/slurmctld
        register: state_dir
      - name: Assert state dir is owned by slurm
        assert:
            that: state_dir.stat.pw_name == "slurm"
            fail_msg: "/var/lib/slurm/slurmctld not owned by slurm user"

      # ── testuser checks ────────────────────────────────────────────────────
      - name: Check testuser OS account exists on controller
        getent:
            database: passwd
            key: testuser
        register: testuser_passwd
      - name: Assert testuser account is present on controller
        assert:
            that: testuser_passwd.ansible_facts.getent_passwd['testuser'] is defined
            fail_msg: "testuser OS account not found on controller"

      # ── sinfo sanity check ─────────────────────────────────────────────────
      - name: Run sinfo to verify cluster is accessible
        command: /usr/local/bin/sinfo --noheader
        changed_when: false
        register: sinfo_out
      - name: Assert sinfo returned output
        assert:
            that: sinfo_out.rc == 0
            fail_msg: "sinfo returned non-zero exit code"

# ── Reconcile worker node hardware with slurm.conf ────────────────────────────
# In Docker containers slurmd may detect different CPU topology than what
# ansible_processor_vcpus reported during converge (slurm.conf template used
# that fact). We query slurmd directly and update slurm.conf on all nodes so
# the worker's registration is accepted.
- name: Fix NodeName in slurm.conf to match actual worker hardware
  hosts: slurm_worker
  become: true
  tasks:
      - name: Query actual hardware from slurmd
        command: /usr/local/sbin/slurmd -C
        register: slurmd_hw
        changed_when: false

      - name: Parse hardware values
        set_fact:
            worker_cpus: "{{ slurmd_hw.stdout | regex_search('CPUs=(\\d+)', '\\1') | first }}"
            worker_sockets: "{{ slurmd_hw.stdout | regex_search('SocketsPerBoard=(\\d+)', '\\1') | first }}"
            worker_cores: "{{ slurmd_hw.stdout | regex_search('CoresPerSocket=(\\d+)', '\\1') | first }}"
            worker_threads: "{{ slurmd_hw.stdout | regex_search('ThreadsPerCore=(\\d+)', '\\1') | first }}"
            worker_mem: "{{ slurmd_hw.stdout | regex_search('RealMemory=(\\d+)', '\\1') | first }}"
            cacheable: true

      - name: Update NodeName line in slurm.conf on worker
        lineinfile:
            path: /etc/slurm/slurm.conf
            regexp: '^NodeName=worker-01\s.*'
            line: >-
                NodeName=worker-01
                CPUs={{ worker_cpus }}
                RealMemory={{ worker_mem }}
                State=UNKNOWN
            state: present

      - name: Restart slurmd on worker to re-register with new config
        service:
            name: slurmd
            state: restarted

- name: Update NodeName in slurm.conf on controller and reconfigure slurmctld
  hosts: slurm_master
  become: true
  tasks:
      - name: Get actual CPU/memory values from worker (cached facts)
        set_fact:
            _worker_hw: "{{ hostvars['worker-01'] }}"

      - name: Update NodeName line in slurm.conf on controller
        lineinfile:
            path: /etc/slurm/slurm.conf
            regexp: '^NodeName=worker-01\s.*'
            line: >-
                NodeName=worker-01
                CPUs={{ hostvars['worker-01']['worker_cpus'] }}
                RealMemory={{ hostvars['worker-01']['worker_mem'] }}
                State=UNKNOWN
            state: present

      - name: Reconfigure slurmctld
        command: /usr/local/bin/scontrol reconfigure
        changed_when: true

      - name: Resume worker node (clear drain/invalid_reg)
        command: /usr/local/bin/scontrol update nodename=worker-01 state=resume
        changed_when: true
        failed_when: false

      - name: Wait for worker node to become idle
        command: /usr/local/bin/sinfo -n worker-01 -h -o "%T"
        register: node_state_poll
        until: node_state_poll.stdout | trim in ['idle', 'allocated', 'mixed']
        retries: 24
        delay: 5
        changed_when: false

      # ── SLURM accounting — add testuser ────────────────────────────────────
      - name: Ensure default account exists in SLURM accounting
        command: >
            /usr/local/bin/sacctmgr -i add account default
            description="Default account" organization="river"
        register: sacctmgr_account
        changed_when: "'Adding Account' in sacctmgr_account.stdout"
        failed_when: >
            sacctmgr_account.rc != 0 and
            'Already existing' not in sacctmgr_account.stdout and
            'Nothing added' not in sacctmgr_account.stdout

      - name: Add testuser to SLURM accounting
        command: >
            /usr/local/bin/sacctmgr -i add user testuser
            account=default cluster=river
        register: sacctmgr_user
        changed_when: "'Adding User' in sacctmgr_user.stdout"
        failed_when: >
            sacctmgr_user.rc != 0 and
            'Already existing' not in sacctmgr_user.stdout and
            'Nothing added' not in sacctmgr_user.stdout

      # ── Job submission as testuser ─────────────────────────────────────────
      - name: Ensure testuser scratch directory exists
        file:
            path: /home/testuser/scratch
            state: directory
            owner: testuser
            group: testuser
            mode: "0755"

      - name: Write job script
        copy:
            dest: /home/testuser/job.sh
            owner: testuser
            group: testuser
            mode: "0755"
            content: |
                #!/bin/bash
                #SBATCH --job-name=mol-test
                #SBATCH --output=/home/testuser/scratch/slurm-%j.out
                #SBATCH --error=/home/testuser/scratch/slurm-%j.err
                #SBATCH --ntasks=1
                touch /home/testuser/scratch/job_result.txt
                chmod 600 /home/testuser/scratch/job_result.txt

      - name: Submit job as testuser
        command: /usr/local/bin/sbatch /home/testuser/job.sh
        become_user: testuser
        register: sbatch_out
        changed_when: true

      - name: Extract job ID
        set_fact:
            slurm_job_id: "{{ sbatch_out.stdout | regex_search('Submitted batch job (\\d+)', '\\1') | first }}"

      - name: Poll squeue until job completes (max 120 s)
        command: /usr/local/bin/squeue --job {{ slurm_job_id }} --noheader
        register: squeue_poll
        until: squeue_poll.stdout | trim == ""
        retries: 24
        delay: 5
        changed_when: false

# ── Worker verification ────────────────────────────────────────────────────────
- name: Verify slurm-worker (worker-01)
  hosts: slurm_worker
  become: true
  tasks:
      - name: Check slurm.conf exists on worker
        stat:
            path: /etc/slurm/slurm.conf
        register: worker_slurm_conf
      - name: Assert slurm.conf is present on worker
        assert:
            that: worker_slurm_conf.stat.exists
            fail_msg: "/etc/slurm/slurm.conf not found on worker"

      - name: Check cgroup.conf exists on worker
        stat:
            path: /etc/slurm/cgroup.conf
        register: cgroup_conf
      - name: Assert cgroup.conf is present on worker
        assert:
            that: cgroup_conf.stat.exists
            fail_msg: "/etc/slurm/cgroup.conf not found on worker"

      - name: Check slurmd binary exists
        stat:
            path: /usr/local/sbin/slurmd
        register: slurmd_bin
      - name: Assert slurmd binary is installed
        assert:
            that: slurmd_bin.stat.exists
            fail_msg: "slurmd binary not found at /usr/local/sbin/slurmd"

      - name: Check munge key is deployed on worker
        stat:
            path: /etc/munge/munge.key
        register: worker_munge_key
      - name: Assert worker munge key exists and has correct permissions
        assert:
            that:
                - worker_munge_key.stat.exists
                - worker_munge_key.stat.mode == "0400"
            fail_msg: "munge.key missing or wrong permissions on worker"

      - name: Check testuser OS account exists on worker
        getent:
            database: passwd
            key: testuser
        register: worker_testuser_passwd
      - name: Assert testuser account is present on worker
        assert:
            that: worker_testuser_passwd.ansible_facts.getent_passwd['testuser'] is defined
            fail_msg: "testuser OS account not found on worker"

      # ── Job result checks (job ran on this worker) ─────────────────────────
      - name: Check job result file exists on worker
        stat:
            path: /home/testuser/scratch/job_result.txt
        register: job_result_file
      - name: Assert job result file exists on worker
        assert:
            that: job_result_file.stat.exists
            fail_msg: "/home/testuser/scratch/job_result.txt was not created by the job"

      - name: Assert job result file has mode 0600
        assert:
            that: job_result_file.stat.mode == "0600"
            fail_msg: "job_result.txt does not have mode 0600 (got {{ job_result_file.stat.mode }})"
