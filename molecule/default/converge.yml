---
# Molecule converge — runs the Slurm-relevant plays only.
# Roles that require external infrastructure (Docker daemon, NVIDIA GPU,
# NFS mounts between real VMs) are excluded so the test stays self-contained.

- name: All nodes
  hosts: all
  become: true
  become_user: root
  roles:
      - slurm-common

- name: Controller
  hosts: slurm_master
  become: true
  become_user: root
  roles:
      - slurm-master

- name: Worker
  hosts: slurm_worker
  become: true
  become_user: root
  roles:
      - slurm-worker
