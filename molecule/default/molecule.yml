---
dependency:
    name: shell
    command: ansible-galaxy role install -r requirements.yml -p roles

driver:
    name: docker

platforms:
    - name: controller-01
      image: geerlingguy/docker-ubuntu2404-ansible:latest
      command: /lib/systemd/systemd
      cgroupns_mode: host
      privileged: true
      volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
      networks:
          - name: slurm-net
      pre_build_image: true
      groups:
          - slurm_master
          - slurm

    - name: worker-01
      image: geerlingguy/docker-ubuntu2404-ansible:latest
      command: /lib/systemd/systemd
      cgroupns_mode: host
      privileged: true
      volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
      networks:
          - name: slurm-net
      pre_build_image: true
      groups:
          - slurm_worker
          - slurm

provisioner:
    name: ansible
    inventory:
        group_vars:
            all:
                ansible_user: root
                slurm_account_db_pass: testpass
        links:
            group_vars: ../../group_vars
    playbooks:
        converge: converge.yml
        verify: verify.yml
    env:
        ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/roles"

verifier:
    name: ansible

scenario:
    test_sequence:
        - dependency
        - create
        - prepare
        - converge
        - verify
        - destroy
