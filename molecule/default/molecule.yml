---
dependency:
    name: shell
    command: ansible-galaxy role install -r requirements.yml -p roles

driver:
    name: docker

platforms:
    - name: controller-01
      image: geerlingguy/docker-ubuntu2404-ansible:latest
      command: /lib/systemd/systemd
      cgroupns_mode: host
      privileged: true
      volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
      networks:
          - name: slurm-net
      pre_build_image: true
      groups:
          - slurm_master
          - slurm

    - name: worker-01
      image: geerlingguy/docker-ubuntu2404-ansible:latest
      command: /lib/systemd/systemd
      cgroupns_mode: host
      privileged: true
      volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
      networks:
          - name: slurm-net
      pre_build_image: true
      groups:
          - slurm_worker
          - slurm

provisioner:
    name: ansible
    inventory:
        group_vars:
            all:
                ansible_user: root
                slurm_account_db_pass: testpass
                # Test user created by the users role
                cluster_users:
                    - name: testuser
                      password: "TestPass123!"
                      uid: 10001
                # PAM: do not restrict node access in tests (adopt-only)
                # so the test user can always SSH without needing a live job first
                slurm_restrict_node_access: false
                slurm_allow_ssh_users:
                    - root
                    - testuser
                # OS/distro detection helpers (mirrors group_vars/all)
                is_debian_compatible: "{{ ansible_os_family == 'Debian' }}"
                is_rhel_compatible: "{{ ansible_os_family == 'RedHat' }}"
                is_ubuntu: "{{ ansible_distribution == 'Ubuntu' }}"
                is_debian: "{{ ansible_distribution == 'Debian' }}"
                is_container: "{{ ansible_virtualization_type | default('') in ['docker', 'podman', 'container', 'lxc', 'lxc-libvirt'] }}"
    playbooks:
        converge: converge.yml
        verify: verify.yml
    env:
        ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/roles"

verifier:
    name: ansible

scenario:
    test_sequence:
        - dependency
        - create
        - prepare
        - converge
        - verify
        - destroy
