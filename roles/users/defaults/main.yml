---
# List of users to manage. Each entry supports:
#   name:       (required) login name
#   password:   (required) plaintext password — will be hashed with sha512
#   uid:        (optional) fixed UID
#   groups:     (optional) list of supplementary groups
#   ssh_key:    (optional) public SSH key string to add to authorized_keys
#   shell:      (optional, default /bin/bash)
#   home:       (optional, default /home/<name>)
#   state:      (optional, default present)
cluster_users: []

# When true, also allow password-based SSH login (sets PasswordAuthentication yes
# and enables PAM in sshd_config). Required for the test user to SSH in.
users_allow_password_ssh: true
